# Hyprland configuration converted from the 0.55 Lua config.

$mainMod = SUPER
$terminal = ghostty +new-window
$fileManager = dolphin
$noctPrefix = qs -c noctalia-shell ipc call
$menu = $noctPrefix launcher toggle

################
### MONITORS ###
################

monitor = eDP-1, preferred, auto, 1.5, bitdepth, 10, icc, /home/yihao/.local/share/icc/default.icm
monitor = desc:Acer Technologies EK221Q H 1335088483W01, 1920x1080@100, auto-center-up, 1
monitor = desc:Beihai Century Joint Innovation Technology Co.Ltd X240 0000000000000, 1920x1080@120, auto-center-left, 1

###################
### ENVIRONMENT ###
###################

env = XCURSOR_SIZE,18
env = HYPRCURSOR_SIZE,18

#################
### AUTOSTART ###
#################

exec-once = qs -c noctalia-shell
exec-once = /usr/lib/xdg-desktop-portal-hyprland
exec-once = /usr/lib/xdg-desktop-portal
exec-once = gsettings set org.gnome.desktop.interface color-scheme 'prefer-dark'
exec-once = hyprpm reload
exec-once = hypridle

##################
### APPEARANCE ###
##################

general {
    gaps_in = 2
    gaps_out = 8
    border_size = 1
    col.active_border = rgba(eeae8abd) rgba(ae8abdee) 45deg
    col.inactive_border = rgba(595959aa)
    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 20
    rounding_power = 2
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 3
        passes = 3
        vibrancy = 0.1696
    }
}

animations {
    enabled = true
}

bezier = easeOutQuint, 0.23, 1, 0.32, 1
bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
bezier = linear, 0, 0, 1, 1
bezier = almostLinear, 0.5, 0.5, 0.75, 1
bezier = quick, 0.15, 0, 0.1, 1
animation = global, 1, 10, default
animation = border, 1, 5.39, easeOutQuint
animation = windows, 1, 4.79, easeOutQuint
animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
animation = windowsOut, 1, 1.49, linear, popin 87%
animation = fadeIn, 1, 1.73, almostLinear
animation = fadeOut, 1, 1.46, almostLinear
animation = fade, 1, 3.03, quick
animation = layers, 1, 3.81, easeOutQuint
animation = layersIn, 1, 4, easeOutQuint, fade
animation = layersOut, 1, 1.5, linear, fade
animation = fadeLayersIn, 1, 1.79, almostLinear
animation = fadeLayersOut, 1, 1.39, almostLinear
animation = workspaces, 1, 1.94, almostLinear, fade
animation = workspacesIn, 1, 1.21, almostLinear, fade
animation = workspacesOut, 1, 1.94, almostLinear, fade
animation = zoomFactor, 1, 7, quick

workspace = w[tv1], gapsout:0, gapsin:0
workspace = f[1], gapsout:0, gapsin:0

dwindle {
    # force_split = 2
    preserve_split = true
}

master {
    new_status = master
}

scrolling {
    fullscreen_on_one_column = true
}

misc {
    force_default_wallpaper = 1
    disable_hyprland_logo = true
    initial_workspace_tracking = 2
    focus_on_activate = true
}

#############
### INPUT ###
#############

input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =
    sensitivity = 0
    follow_mouse = 2

    touchpad {
        natural_scroll = true
    }
}

gesture = 3, horizontal, workspace

###################
### KEYBINDINGS ###
###################

bind = $mainMod, Q, exec, $terminal
bind = $mainMod, W, killactive
bind = $mainMod, A, exec, $noctPrefix controlCenter toggle
bind = $mainMod SHIFT, V, exec, $noctPrefix launcher clipboard
bind = $mainMod, Tab, exec, $noctPrefix launcher windows
bind = $mainMod CTRL, L, exec, $noctPrefix sessionMenu toggle
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, exec, sh -c "hyprctl dispatch togglefloating && hyprctl dispatch resizeactive exact 50% 50% && hyprctl dispatch centerwindow"
bind = $mainMod SHIFT, F23, exec, $menu
bind = $mainMod, P, pseudo
bind = $mainMod, T, layoutmsg, togglesplit
bind = $mainMod, F, fullscreen

bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

bind = $mainMod, left, movewindow, l
bind = $mainMod, right, movewindow, r
bind = $mainMod, up, movewindow, u
bind = $mainMod, down, movewindow, d

binde = $mainMod SHIFT, L, resizeactive, 50 0
binde = $mainMod SHIFT, H, resizeactive, -50 0
binde = $mainMod SHIFT, J, resizeactive, 0 50
binde = $mainMod SHIFT, K, resizeactive, 0 -50

bind = $mainMod, 1, workspace, 1
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod, 0, workspace, 10
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic
bind = , Print, exec, grim -g "$(slurp)" /tmp/screenshot.png && swappy -f /tmp/screenshot.png && rm /tmp/screenshot.png
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bindm = $mainMod, mouse:272, movewindow
bindm = ALT, mouse:272, resizewindow

bindle = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindle = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindle = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindle = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindle = , XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindle = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

####################
### WINDOW RULES ###
####################

windowrule = match:float false, match:workspace w[tv1], border_size 0
windowrule = match:float false, match:workspace w[tv1], rounding 0
windowrule = match:float false, match:workspace f[1], border_size 0
windowrule = match:float false, match:workspace f[1], rounding 0
windowrule = match:class .*, rounding 5
windowrule = match:class ^$, match:title ^$, match:xwayland true, match:float true, match:fullscreen false, match:pin false, no_focus true
windowrule = match:class hyprland-run, move 20 monitor_h-120
windowrule = match:class hyprland-run, float true
windowrule = match:class firefox, workspace current
windowrule = match:class firefox, focus_on_activate true

windowrule = workspace 10, match:class Waydroid
